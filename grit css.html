<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grit css </title>
    <style> 
    body {
      font-family: sans-serif;
    }
    .grid-container {
     display: grid;
     grid-template-columns: auto auto auto;
     padding: 20px;
     background-color: rgb(50, 33, 9);
     border-radius:10px ;
     }
    .grid-item {
        padding: 20px;
        background-color: antiquewhite;
        font-weight: bold;
        margin: 10px;
        border-radius: 10px;
    }
    </style>
   
</head>
<body>
    <div class="grid-container">
        <div class="grid-item"> Grit item:1</div>
          <div class="grid-item"> Grit item:2</div>
            <div class="grid-item"> Grit item:3</div>
              <div class="grid-item"> Grit item:4</div>
                <div class="grid-item"> Grit item:5</div>
                  <div class="grid-item"> Grit item:6</div>
    </div>
</body>
</html>
